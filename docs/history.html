<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0c0c0e">
<title>History — Formbook</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="nav"></div>
<div class="wrap" id="app">
  <div class="pagehead"><h1>Strike rate & history</h1></div>
  <div id="body"><div class="empty">Loading…</div></div>
</div>

<script src="assets/common.js"></script>
<script>
const F=window.Formbook, esc=F.esc;
if(F.requireUnlock()){ F.renderNav('history'); boot(); }

async function boot(){
  try{
    const [sr,m]=await Promise.all([
      F.fetchJSON('data/strike-rate.json'),
      F.fetchJSON('data/manifest.json').catch(()=>({predictions:[]}))
    ]);
    render(sr,m);
  }catch(err){
    document.getElementById('body').innerHTML='<div class="empty">Could not load history.<br><small>'+esc(err.message)+'</small></div>';
  }
}

function render(sr,m){
  document.getElementById('body').innerHTML = summaryCard(sr)+calibrationCard(sr)+historyCard(sr,m);
}

function summaryCard(sr){
  return `<section class="card"><h2>📈 Top-pick strike rate</h2>
    <div class="kpis">
      <div class="kpi"><b>${sr.winPct}%</b>win</div>
      <div class="kpi"><b>${sr.placePct}%</b>place</div>
      <div class="kpi"><b>${sr.topPickWins}</b>wins</div>
      <div class="kpi"><b>${sr.topPickPlaces}</b>places</div>
      <div class="kpi"><b>${sr.settled}</b>settled</div>
    </div>
    ${sr.history&&sr.history.length?dots(sr.history):'<div class="foot" style="text-align:left">No settled races yet — this fills in automatically as results are logged.</div>'}
  </section>`;
}
function dots(h){
  return '<div class="sr">'+h.map(x=>{
    const cls=x.won?'win':(x.placed?'place':'miss'),t=x.won?'W':(x.placed?'P':'·');
    return `<span class="dot ${cls}" title="${esc(x.track)} R${x.race} ${x.date}">${t}</span>`;
  }).join('')+'</div><div class="foot" style="text-align:left;margin-top:8px">Each square = one settled race (newest right). <span style="color:var(--green)">W</span> win · <span style="color:var(--gold)">P</span> placed · miss.</div>';
}

// CONFIDENCE CALIBRATION — predicted win% (expected) vs actual win rate
function calibrationCard(sr){
  const cal=sr.calibration||[];
  const any=cal.some(c=>c.n>0);
  const rows=cal.map(c=>{
    const w=c.winPct==null?0:c.winPct;
    return `<div class="calrow">
      <div class="lbl">${esc(c.tier)}</div>
      <div class="track"><div class="fill" style="width:${Math.max(w,c.n?6:0)}%">${c.winPct==null?'':'actual '+c.winPct+'%'}</div></div>
      <div class="n">${c.expectedPct!=null?'exp '+c.expectedPct+'% · ':''}${c.n} race${c.n===1?'':'s'}</div>
    </div>`;
  }).join('');
  return `<section class="card"><h2>🎯 Confidence calibration</h2>
    ${any?rows+`<div class="foot" style="text-align:left;margin-top:8px">Picks grouped by the <b>win probability</b> we gave them. <b>exp</b> = average probability we predicted; the bar = the <b>actual</b> win rate. Well-calibrated = actual ≈ expected in each band (e.g. picks we call 40%+ should win ~40% of the time). Updates as more races settle.</div>`
        :'<div class="empty">Needs settled races. Once outcomes are logged, this checks whether our stated win probabilities match reality.</div>'}
  </section>`;
}

function historyCard(sr,m){
  const settled=(m.predictions||[]).filter(p=>p.settled).sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(b.race||0)-(a.race||0));
  if(!settled.length) return '';
  const rows=settled.map(p=>{
    const won=p.result&&p.result.topPickWon, placed=p.result&&p.result.topPickPlaced;
    const badge=won?'<span class="tag win">WON</span>':(placed?'<span class="tag" style="color:var(--gold);border-color:rgba(212,175,55,.4)">PLACED</span>':'<span class="tag loss">missed</span>');
    return `<div class="racecard" onclick="location.href='race.html?id=${encodeURIComponent(p.id)}'">
      <div class="num">R${p.race}</div>
      <div class="mid"><div class="t">${esc(p.track)||'—'} · ${esc(p.date)}</div>
      <div class="s">pick: ${esc(p.result&&p.result.topPick||p.topPick||'—')}${p.result&&p.result.winner?' · won by '+esc(p.result.winner):''}</div></div>
      <div class="rt">${badge}</div>
    </div>`;
  }).join('');
  return `<section class="card"><h2>🗂️ Settled races</h2>${rows}</section>`;
}
</script>
</body>
</html>
