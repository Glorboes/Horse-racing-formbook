name: Pull results

# Scrapes SA results (Gold Circle + 4Racing), logs outcomes, updates
# head-to-head + strike rate, and pushes so the dashboard refreshes.
#
# - Runs nightly (browser mode, best chance past Cloudflare).
# - Run manually from the Actions tab for the 6-MONTH BACKFILL:
#     Actions → "Pull results" → Run workflow → days = 180
#
# NOTE: the live sites are Cloudflare-protected and the CSS selectors in
# scripts/pull-results.js (ADAPTERS) are UNVERIFIED against the real pages.
# If a run logs 0 races, download the debug HTML artifact, tune the selectors,
# and re-run — or feed results via data/results-inbox/ which always works.

on:
  schedule:
    - cron: '0 20 * * *'          # ~22:00 SAST nightly
  workflow_dispatch:
    inputs:
      days:
        description: 'Days back to pull (180 ≈ 6 months)'
        default: '1'
        required: true
      browser:
        description: 'Use headless browser (better vs Cloudflare)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: formbook-write
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund

      - name: Install headless browser
        if: ${{ github.event_name == 'schedule' || inputs.browser }}
        run: |
          npm i playwright --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Pull results
        run: |
          DAYS='${{ inputs.days || 1 }}'
          BROWSER='${{ (github.event_name == 'schedule' || inputs.browser) && '--browser' || '' }}'
          echo "Pulling $DAYS day(s) $BROWSER"
          node scripts/pull-results.js --source live --days "$DAYS" $BROWSER --debug --no-push || true
          node scripts/pull-results.js --source inbox --no-push || true

      - name: Upload debug HTML (for selector tuning)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug
          path: data/review/*.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated database + dashboard
        run: |
          git config user.name 'formbook-bot'
          git config user.email 'actions@github.com'
          git add data docs
          git commit -m "Auto-update results $(date -u +%F) [skip ci]" || { echo 'nothing to commit'; exit 0; }
          git push
